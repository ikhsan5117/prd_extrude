<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Velasto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121820;
            color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #0dcaf0; }
        p { max-width: 500px; margin-bottom: 20px; line-height: 1.5; color: #adb5bd; }
        button {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #0b5ed7; }
        .icon { font-size: 5rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="icon">🔌</div>
    <h1>Anda Sedang Offline</h1>
    <p>Halaman ini belum pernah Anda kunjungi sebelumnya, sehingga belum tersimpan di memori lokal perangkat Anda. Silakan hubungkan kembali ke jaringan untuk mengakses halaman ini.</p>
    <button onclick="window.location.reload()">Coba Muat Ulang</button>
</body>
</html>
